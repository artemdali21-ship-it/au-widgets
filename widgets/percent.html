<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Didact+Gothic&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#191919;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
.container{display:flex;flex-direction:column;align-items:center;gap:16px;width:280px}
.value{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:48px;color:rgba(212,168,85,0.85);letter-spacing:3px;line-height:1}
.percent{font-size:22px;color:rgba(180,149,106,0.5);font-weight:300}
.bar-container{width:100%;height:4px;background:rgba(180,149,106,0.08);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;width:64.4%;background:linear-gradient(90deg,#8b6914 0%,#d4a855 50%,#e8c97a 100%);border-radius:2px;transition:width 2s ease}
.label{font-family:'Didact Gothic',sans-serif;font-size:9px;letter-spacing:4px;color:rgba(180,149,106,0.3);text-transform:uppercase}
.sub{font-family:'Cormorant Garamond',serif;font-size:12px;color:rgba(180,149,106,0.25);letter-spacing:2px;margin-top:4px}
</style></head><body>
<div class="container">
<div><span class="value">64.4</span><span class="percent">%</span></div>
<div class="bar-container"><div class="bar-fill"></div></div>
<div class="label">SYSTEM PROGRESS</div>
<div class="sub">96 / 149 tasks</div>
</div></body></html>
