<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Механизм</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#191919;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
  
  canvas{display:block}
</style>
</head>
<body>
<canvas id="c" width="300" height="300"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const W=300,H=300,cx=W/2,cy=H/2;
let t=0;

function gear(ox,oy,r,teeth,rot,inner){
  x.save();
  x.translate(ox,oy);
  x.rotate(rot);
  
  // Back glow
  const g=x.createRadialGradient(0,0,r*0.3,0,0,r*1.3);
  g.addColorStop(0,'rgba(212,168,85,0.06)');
  g.addColorStop(1,'rgba(212,168,85,0)');
  x.fillStyle=g;
  x.beginPath();x.arc(0,0,r*1.3,0,Math.PI*2);x.fill();
  
  // Teeth
  const step=Math.PI*2/teeth;
  x.beginPath();
  for(let i=0;i<teeth;i++){
    const a=step*i;
    const a1=a-step*0.15,a2=a+step*0.15;
    const ro=r+8,ri=r;
    x.lineTo(Math.cos(a1)*ri,Math.sin(a1)*ri);
    x.lineTo(Math.cos(a1)*ro,Math.sin(a1)*ro);
    x.lineTo(Math.cos(a2)*ro,Math.sin(a2)*ro);
    x.lineTo(Math.cos(a2)*ri,Math.sin(a2)*ri);
  }
  x.closePath();
  x.strokeStyle='rgba(212,168,85,0.25)';
  x.lineWidth=1.5;
  x.stroke();
  
  // Outer ring
  x.beginPath();x.arc(0,0,r,0,Math.PI*2);
  x.strokeStyle='rgba(212,168,85,0.3)';
  x.lineWidth=2;
  x.shadowColor='rgba(212,168,85,0.1)';
  x.shadowBlur=12;
  x.stroke();
  x.shadowBlur=0;
  
  // Inner ring
  if(inner){
    x.beginPath();x.arc(0,0,r*0.6,0,Math.PI*2);
    x.strokeStyle='rgba(212,168,85,0.12)';
    x.lineWidth=1;
    x.setLineDash([4,4]);
    x.stroke();
    x.setLineDash([]);
  }
  
  // Core
  const cg=x.createRadialGradient(-2,-2,0,0,0,r*0.15);
  cg.addColorStop(0,'rgba(212,168,85,0.3)');
  cg.addColorStop(1,'rgba(212,168,85,0.08)');
  x.fillStyle=cg;
  x.beginPath();x.arc(0,0,r*0.12,0,Math.PI*2);x.fill();
  x.strokeStyle='rgba(212,168,85,0.3)';
  x.lineWidth=1.5;
  x.shadowColor='rgba(212,168,85,0.15)';
  x.shadowBlur=8;
  x.stroke();
  x.shadowBlur=0;
  
  x.restore();
}

function particle(px,py,sp){
  const y2=py-Math.sin(t*sp)*20;
  const a=Math.max(0,Math.sin(t*sp*0.5)*0.3);
  x.fillStyle=`rgba(212,168,85,${a})`;
  x.beginPath();x.arc(px,y2,1.2,0,Math.PI*2);x.fill();
}

function draw(){
  t+=0.008;
  x.clearRect(0,0,W,H);
  
  // Center glow (breathing)
  const pulse=0.7+Math.sin(t*1.5)*0.3;
  const pg=x.createRadialGradient(cx,cy,10,cx,cy,100*pulse);
  pg.addColorStop(0,`rgba(212,168,85,${0.08*pulse})`);
  pg.addColorStop(0.5,`rgba(212,168,85,${0.03*pulse})`);
  pg.addColorStop(1,'rgba(212,168,85,0)');
  x.fillStyle=pg;
  x.beginPath();x.arc(cx,cy,120,0,Math.PI*2);x.fill();
  
  // Gears
  gear(cx,cy,65,16,t*0.5,true);
  gear(cx+72,cy-58,38,10,-t*0.8,true);
  gear(cx-60,cy+55,30,8,t*1.0,false);
  gear(cx-52,cy-48,22,6,-t*1.3,false);
  gear(cx+55,cy+50,18,6,t*1.6,false);
  
  // Particles
  particle(cx-80,cy-30,1.2);
  particle(cx+85,cy+25,0.8);
  particle(cx-20,cy-80,1.5);
  particle(cx+30,cy+75,1.0);
  particle(cx-70,cy+60,0.7);
  particle(cx+70,cy-70,1.1);
  particle(cx,cy-60,0.9);
  
  // Label
  x.fillStyle='rgba(180,175,165,0.12)';
  x.font='7px Didact Gothic, sans-serif';
  x.textAlign='center';
  x.letterSpacing='3px';
  x.fillText('СИСТЕМА РАБОТАЕТ',cx,H-8);
  
  requestAnimationFrame(draw);
}
draw();
</script>
<link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&display=swap" rel="stylesheet">
</body>
</html>
