<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buddha</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #191919;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  
  .scene {
    position: relative;
    width: 400px;
    height: 550px;
  }
  
  .buddha-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
  }
  
  /* Flame container - positioned over the candle */
  .flame-container {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-55%);
    width: 30px;
    height: 50px;
    z-index: 10;
  }
  
  /* Main flame */
  .flame {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 38px;
    background: radial-gradient(ellipse at 50% 90%, 
      #fff9e0 0%, 
      #ffd54f 15%, 
      #ffab00 30%, 
      #ff6d00 50%, 
      #e65100 70%, 
      transparent 100%);
    border-radius: 50% 50% 35% 35% / 80% 80% 40% 40%;
    filter: blur(1px);
    animation: flicker 0.15s infinite alternate, sway 2s ease-in-out infinite;
  }
  
  /* Inner bright core */
  .flame-core {
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 22px;
    background: radial-gradient(ellipse at 50% 85%,
      #ffffff 0%,
      #fff9c4 30%,
      #ffecb3 60%,
      transparent 100%);
    border-radius: 50% 50% 35% 35% / 80% 80% 40% 40%;
    filter: blur(0.5px);
    animation: flicker-core 0.12s infinite alternate, sway-core 1.8s ease-in-out infinite;
  }
  
  /* Outer glow */
  .flame-glow {
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 45px;
    background: radial-gradient(ellipse at 50% 70%,
      rgba(255, 183, 77, 0.25) 0%,
      rgba(255, 152, 0, 0.12) 30%,
      rgba(255, 111, 0, 0.05) 50%,
      transparent 70%);
    border-radius: 50%;
    animation: glow-pulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  /* Ambient light on buddha */
  .ambient-light {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 250px;
    background: radial-gradient(ellipse at 50% 100%,
      rgba(255, 152, 0, 0.08) 0%,
      rgba(255, 111, 0, 0.04) 40%,
      transparent 70%);
    pointer-events: none;
    animation: ambient-pulse 3s ease-in-out infinite;
    z-index: 5;
  }

  /* Smoke wisps */
  .smoke {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: rgba(200, 200, 200, 0.08);
    border-radius: 50%;
    filter: blur(3px);
    z-index: 11;
  }
  
  .smoke:nth-child(1) { animation: smoke-rise 4s ease-out infinite; animation-delay: 0s; }
  .smoke:nth-child(2) { animation: smoke-rise 4s ease-out infinite; animation-delay: 1.2s; }
  .smoke:nth-child(3) { animation: smoke-rise 4s ease-out infinite; animation-delay: 2.8s; }

  @keyframes flicker {
    0% { height: 36px; width: 13px; opacity: 0.95; }
    25% { height: 40px; width: 14px; opacity: 1; }
    50% { height: 34px; width: 12px; opacity: 0.9; }
    75% { height: 38px; width: 15px; opacity: 0.97; }
    100% { height: 37px; width: 13px; opacity: 0.93; }
  }
  
  @keyframes flicker-core {
    0% { height: 20px; opacity: 0.9; }
    50% { height: 24px; opacity: 1; }
    100% { height: 21px; opacity: 0.85; }
  }
  
  @keyframes sway {
    0%, 100% { transform: translateX(-50%) rotate(-1.5deg); }
    25% { transform: translateX(-48%) rotate(1deg); }
    50% { transform: translateX(-52%) rotate(-0.5deg); }
    75% { transform: translateX(-50%) rotate(1.5deg); }
  }
  
  @keyframes sway-core {
    0%, 100% { transform: translateX(-50%) rotate(-1deg); }
    50% { transform: translateX(-50%) rotate(1deg); }
  }
  
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.08); }
  }
  
  @keyframes ambient-pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 0.9; }
  }
  
  @keyframes smoke-rise {
    0% { 
      transform: translateX(-50%) translateY(0) scale(1); 
      opacity: 0.12; 
    }
    50% { 
      transform: translateX(calc(-50% + 8px)) translateY(-40px) scale(2.5); 
      opacity: 0.06; 
    }
    100% { 
      transform: translateX(calc(-50% - 5px)) translateY(-80px) scale(4); 
      opacity: 0; 
    }
  }
</style>
</head>
<body>
<div class="scene">
  <img class="buddha-img" src="https://raw.githubusercontent.com/artemdali21-ship-it/agent-universe/main/widgets/buddha.png" alt="Buddha">
  <div class="ambient-light"></div>
  <div class="flame-container">
    <div class="flame-glow"></div>
    <div class="flame"></div>
    <div class="flame-core"></div>
    <div class="smoke"></div>
    <div class="smoke"></div>
    <div class="smoke"></div>
  </div>
</div>
</body>
</html>
