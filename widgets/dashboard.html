<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КЦ · Панель здоровья</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Didact+Gothic&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#191919;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Didact Gothic',sans-serif;padding:20px 24px;overflow:hidden}
  
  .dashboard{width:100%}
  
  .top{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px}
  .bottom{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:10px}
  
  .card{text-align:center;padding:26px 16px 20px;border-radius:12px;border:1px solid rgba(212,168,85,0.1);background:rgba(30,28,24,0.6);position:relative;transition:border-color 0.3s}
  .card:hover{border-color:rgba(212,168,85,0.25)}
  .card.big{padding:32px 16px 26px}
  
  .dot{position:absolute;top:10px;right:10px;width:7px;height:7px;border-radius:50%;box-shadow:0 0 6px currentColor}
  .dot.green{color:#4CAF50;background:#4CAF50}
  .dot.red{color:#EF5350;background:#EF5350}
  .dot.orange{color:#FF9800;background:#FF9800}
  
  .num{font-family:'Cormorant Garamond',serif;font-weight:400;line-height:1;color:rgba(212,168,85,0.85)}
  .big .num{font-size:64px}
  .small .num{font-size:44px}
  
  .num .unit{font-size:0.45em;color:rgba(180,175,165,0.4);font-weight:300}
  .num.red-num{color:rgba(239,83,80,0.85)}
  
  .lbl{font-size:10px;letter-spacing:2.5px;color:rgba(180,175,165,0.35);text-transform:uppercase;margin-top:8px}
  .sub{font-size:9px;color:rgba(180,175,165,0.2);margin-top:4px;letter-spacing:0.5px}
  
  .src{text-align:right;font-size:8px;letter-spacing:1.5px;color:rgba(180,175,165,0.15);text-transform:uppercase}
</style>
</head>
<body>
<div class="dashboard">
  <div class="top">
    <div class="card big">
      <div class="dot green"></div>
      <div class="num">64.4<span class="unit">%</span></div>
      <div class="lbl">Готовность системы</div>
      <div class="sub">Проект → Мастер-план → Фазы → %</div>
    </div>
    <div class="card big">
      <div class="dot green"></div>
      <div class="num">9.15</div>
      <div class="lbl">Качество системы</div>
      <div class="sub">Средняя оценка проектов</div>
    </div>
  </div>
  <div class="bottom">
    <div class="card small">
      <div class="dot green"></div>
      <div class="num">3</div>
      <div class="lbl">В работе</div>
      <div class="sub">активных проекта</div>
    </div>
    <div class="card small">
      <div class="dot red"></div>
      <div class="num red-num">22</div>
      <div class="lbl">Горящих</div>
      <div class="sub">задач · требуют разбора</div>
    </div>
    <div class="card small">
      <div class="dot orange"></div>
      <div class="num">9<span class="unit"> / 43+</span></div>
      <div class="lbl">Готовность агентов</div>
      <div class="sub">из 43+ в реестре</div>
    </div>
  </div>
  <div class="src">Срез: 23.03.2026 · Навигатор · Стюард · Проектор</div>
</div>
</body>
</html>
