<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:transparent;display:flex;align-items:center;justify-content:center;padding:8px 0}
  .banner{
    width:100%;max-width:100%;height:52px;
    border-radius:10px;
    background:linear-gradient(135deg, rgba(76,175,80,0.12) 0%, rgba(100,200,105,0.18) 50%, rgba(76,175,80,0.10) 100%);
    border:1px solid rgba(76,175,80,0.25);
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
    transition:border-color 0.3s ease, box-shadow 0.3s ease;
    cursor:default;
  }
  .banner:hover{
    border-color:rgba(76,175,80,0.45);
    box-shadow:0 0 24px rgba(76,175,80,0.1);
  }
  .banner::before{
    content:'';position:absolute;top:0;left:15%;right:15%;height:1.5px;
    background:linear-gradient(90deg,transparent,rgba(76,175,80,0.4),transparent);
  }
  .banner::after{
    content:'';position:absolute;bottom:0;left:15%;right:15%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(76,175,80,0.15),transparent);
  }
  .text{
    font-family:'Inter',sans-serif;font-size:14px;font-weight:500;
    letter-spacing:4px;text-transform:uppercase;
    color:rgba(100,210,110,0.75);
    transition:color 0.3s, text-shadow 0.3s;
  }
  .banner:hover .text{
    color:rgba(110,220,120,0.9);
    text-shadow:0 0 16px rgba(76,175,80,0.3);
  }
</style>
</head>
<body><div class="banner"><span class="text">Доходы</span></div></body>
</html>
