<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 60" width="1400" height="60" preserveAspectRatio="none">
  <defs>
    <linearGradient id="hfade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="12%" style="stop-color:#2D0A6E;stop-opacity:1"/>
      <stop offset="35%" style="stop-color:#7B1FA8;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#C9A44A;stop-opacity:1"/>
      <stop offset="65%" style="stop-color:#7B1FA8;stop-opacity:1"/>
      <stop offset="88%" style="stop-color:#2D0A6E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="vfade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#000000;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#000000;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#000000;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </linearGradient>
    <mask id="vmask">
      <rect width="1400" height="60" fill="url(#vfade)"/>
    </mask>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="18" width="1400" height="24" rx="0" fill="url(#hfade)" mask="url(#vmask)" opacity="0.5"/>
  <rect x="0" y="26" width="1400" height="8" rx="0" fill="url(#hfade)" filter="url(#glow)" opacity="0.95"/>
  <rect x="0" y="29.5" width="1400" height="1" rx="0" fill="url(#hfade)" opacity="1"/>
</svg>
